name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: codeinsight-win32-x64
            binary: codeinsight.exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: codeinsight-linux-x64
            binary: codeinsight
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: codeinsight-linux-arm64
            binary: codeinsight
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: codeinsight-darwin-x64
            binary: codeinsight
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: codeinsight-darwin-arm64
            binary: codeinsight

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\${{ matrix.binary }} dist\
          cd dist && tar czf ..\${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  publish-github:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare npm packages
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          # Platform packages
          declare -A PLATFORMS=(
            ["codeinsight-win32-x64"]="win32 x64 codeinsight.exe"
            ["codeinsight-linux-x64"]="linux x64 codeinsight"
            ["codeinsight-linux-arm64"]="linux arm64 codeinsight"
            ["codeinsight-darwin-x64"]="darwin x64 codeinsight"
            ["codeinsight-darwin-arm64"]="darwin arm64 codeinsight"
          )

          for pkg in "${!PLATFORMS[@]}"; do
            read -r os cpu binary <<< "${PLATFORMS[$pkg]}"
            dir="npm/${pkg}"
            mkdir -p "${dir}/bin"

            tar xzf "artifacts/${pkg}/${pkg}.tar.gz" -C "${dir}/bin"
            chmod +x "${dir}/bin/${binary}" 2>/dev/null || true

            cat > "${dir}/package.json" << PKGJSON
          {
            "name": "@codeinsight/${pkg#codeinsight-}",
            "version": "${VERSION}",
            "description": "codeinsight binary for ${os}-${cpu}",
            "os": ["${os}"],
            "cpu": ["${cpu}"],
            "bin": {
              "codeinsight": "bin/${binary}"
            },
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "https://github.com/faizelmahomed/codeinsight"
            }
          }
          PKGJSON
          done

          # Main package
          mkdir -p npm/codeinsight/bin

          cat > npm/codeinsight/bin/codeinsight.js << 'WRAPPER'
          #!/usr/bin/env node
          const { execFileSync } = require('child_process');
          const path = require('path');
          const fs = require('fs');

          const PLATFORMS = {
            'win32-x64': '@codeinsight/win32-x64',
            'linux-x64': '@codeinsight/linux-x64',
            'linux-arm64': '@codeinsight/linux-arm64',
            'darwin-x64': '@codeinsight/darwin-x64',
            'darwin-arm64': '@codeinsight/darwin-arm64',
          };

          const key = `${process.platform}-${process.arch}`;
          const pkg = PLATFORMS[key];

          if (!pkg) {
            console.error(`Unsupported platform: ${key}`);
            process.exit(1);
          }

          let binPath;
          try {
            const pkgPath = require.resolve(`${pkg}/package.json`);
            const pkgDir = path.dirname(pkgPath);
            const pkgJson = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            const binName = Object.values(pkgJson.bin)[0];
            binPath = path.join(pkgDir, binName);
          } catch (e) {
            console.error(`Platform package ${pkg} not found. Run: npm install ${pkg}`);
            process.exit(1);
          }

          try {
            const result = execFileSync(binPath, process.argv.slice(2), {
              stdio: 'inherit',
              maxBuffer: 50 * 1024 * 1024,
            });
          } catch (e) {
            process.exit(e.status || 1);
          }
          WRAPPER

          cat > npm/codeinsight/package.json << PKGJSON
          {
            "name": "codeinsight",
            "version": "${VERSION}",
            "description": "Fast codebase analyzer using tree-sitter. Instant project understanding for AI coding tools.",
            "bin": {
              "codeinsight": "bin/codeinsight.js"
            },
            "optionalDependencies": {
              "@codeinsight/win32-x64": "${VERSION}",
              "@codeinsight/linux-x64": "${VERSION}",
              "@codeinsight/linux-arm64": "${VERSION}",
              "@codeinsight/darwin-x64": "${VERSION}",
              "@codeinsight/darwin-arm64": "${VERSION}"
            },
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "https://github.com/faizelmahomed/codeinsight"
            },
            "homepage": "https://github.com/faizelmahomed/codeinsight",
            "keywords": ["tree-sitter", "code-analysis", "ast", "codebase", "ai-tools", "claude-code"]
          }
          PKGJSON

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/codeinsight-*/; do
            cd "$dir"
            npm publish --access public || true
            cd ../..
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/codeinsight
          npm publish --access public
